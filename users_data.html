<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geometrixx — Registered Users Data</title>
    <script src="scripts/auth.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Helvetica, Arial, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        h1 {
            color: #F05A28;
            font-size: 22px;
            margin: 0;
        }
        .meta {
            color: #888;
            font-size: 13px;
        }
        .actions { display: flex; gap: 10px; }
        .btn {
            background: #F05A28;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #d44a1f; }
        .btn-outline {
            background: transparent;
            border: 1px solid #F05A28;
            color: #F05A28;
        }
        .btn-outline:hover { background: #F05A28; color: #fff; }
        pre {
            background: #252526;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px 24px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .string { color: #ce9178; }
        .number { color: #b5cea8; }
        .key { color: #9cdcfe; }
        .bracket { color: #ffd700; }
        .null { color: #569cd6; }
        .empty-msg {
            text-align: center;
            color: #888;
            font-size: 16px;
            padding: 60px 0;
        }
        .count-badge {
            background: #333;
            color: #F05A28;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }
        .table-view { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table-view th {
            background: #F05A28;
            color: #fff;
            padding: 8px 12px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table-view td {
            padding: 8px 12px;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }
        .table-view tr:hover td { background: #2a2a2a; }
        .view-toggle { display: flex; gap: 6px; margin-bottom: 16px; }
        .toggle-btn {
            background: #333;
            color: #aaa;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .toggle-btn.active { background: #F05A28; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>Geometrixx — Registered Users</h1>
        <span class="meta">Auto-updates on page refresh · Data stored in localStorage</span>
    </div>
    <div class="actions">
        <span class="count-badge" id="userCount">0 users</span>
        <button class="btn" onclick="downloadJSON()">Download JSON</button>
        <button class="btn btn-outline" onclick="copyJSON()">Copy to Clipboard</button>
        <button class="btn btn-outline" onclick="location.reload()">Refresh</button>
    </div>
</div>

<div class="view-toggle">
    <button class="toggle-btn active" id="btnJson" onclick="showView('json')">JSON View</button>
    <button class="toggle-btn" id="btnTable" onclick="showView('table')">Table View</button>
</div>

<div id="jsonView"></div>
<div id="tableView" style="display:none;"></div>

<script>
    function getUsersData() {
        var raw = [];
        try {
            var data = localStorage.getItem('geometrixx_users');
            raw = data ? JSON.parse(data) : [];
        } catch (e) { raw = []; }

        return raw.map(function(u) {
            return {
                userId: u.userId || '',
                fullName: u.fullName || '',
                email: u.email || '',
                phoneNumber: u.phone || '',
                loyaltyTier: u.loyaltyStatus || 'guest',
                signupDate: u.createdAt ? u.createdAt.split('T')[0] : '',
                city: u.city || '',
                country: u.country || ''
            };
        });
    }

    function syntaxHighlight(json) {
        json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return json.replace(
            /("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
            function (match) {
                var cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                        match = match.replace(/"/g, '');
                        match = '"' + match;
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'null';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            }
        );
    }

    function render() {
        var users = getUsersData();
        document.getElementById('userCount').textContent = users.length + ' user' + (users.length !== 1 ? 's' : '');

        // JSON view
        if (users.length === 0) {
            document.getElementById('jsonView').innerHTML = '<div class="empty-msg">No registered users yet.<br>Sign up at <a href="signup.html" style="color:#F05A28;">signup.html</a> to see data here.</div>';
        } else {
            var jsonStr = JSON.stringify(users, null, 2);
            document.getElementById('jsonView').innerHTML = '<pre>' + syntaxHighlight(jsonStr) + '</pre>';
        }

        // Table view
        if (users.length > 0) {
            var html = '<table class="table-view"><tr>';
            var keys = ['userId', 'fullName', 'email', 'phoneNumber', 'loyaltyTier', 'signupDate', 'city', 'country'];
            for (var k = 0; k < keys.length; k++) { html += '<th>' + keys[k] + '</th>'; }
            html += '</tr>';
            for (var i = 0; i < users.length; i++) {
                html += '<tr>';
                for (var j = 0; j < keys.length; j++) {
                    html += '<td>' + (users[i][keys[j]] || '—') + '</td>';
                }
                html += '</tr>';
            }
            html += '</table>';
            document.getElementById('tableView').innerHTML = html;
        } else {
            document.getElementById('tableView').innerHTML = '<div class="empty-msg">No users to display.</div>';
        }
    }

    function getJSONString() {
        return JSON.stringify(getUsersData(), null, 2);
    }

    function downloadJSON() {
        var blob = new Blob([getJSONString()], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'geometrixx_users.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function copyJSON() {
        var text = getJSONString();
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(function() {
                alert('JSON copied to clipboard!');
            });
        } else {
            var ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert('JSON copied to clipboard!');
        }
    }

    function showView(view) {
        document.getElementById('jsonView').style.display = view === 'json' ? '' : 'none';
        document.getElementById('tableView').style.display = view === 'table' ? '' : 'none';
        document.getElementById('btnJson').className = 'toggle-btn' + (view === 'json' ? ' active' : '');
        document.getElementById('btnTable').className = 'toggle-btn' + (view === 'table' ? ' active' : '');
    }

    // Listen for localStorage changes from other tabs
    window.addEventListener('storage', function(e) {
        if (e.key === 'geometrixx_users') render();
    });

    render();
</script>

</body>
</html>
